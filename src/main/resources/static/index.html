<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .hotel-card, .room-card, .booking-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 5px;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 25px;
        }

        .tab-btn {
            background: #ecf0f1;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #3498db;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏨 Hotel Booking System</h1>
            <div id="authSection"></div>
        </div>

        <!-- User Tabs (visible to everyone) -->
        <div id="userTabs">
            <button class="tab-btn active" onclick="showTab('hotels')">🏨 Hotels</button>
            <button class="tab-btn" onclick="showTab('search')">🔍 Search Rooms</button>
            <button class="tab-btn" onclick="showTab('mybookings')">📋 My Bookings</button>
        </div>

        <!-- Admin Tabs (only visible to admin) -->
        <div id="adminTabs" style="display:none;">
            <button class="tab-btn" onclick="showTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="showTab('manageHotels')">🏨 Manage Hotels</button>
            <button class="tab-btn" onclick="showTab('manageRooms')">🛏️ Manage Rooms</button>
            <button class="tab-btn" onclick="showTab('allBookings')">📅 All Bookings</button>
            <button class="tab-btn" onclick="showTab('manageUsers')">👥 Manage Users</button>
        </div>

        <!-- USER VIEWS -->
        <div id="hotelsTab" class="tab-content active">
            <div class="card">
                <h2>All Hotels</h2>
                <div id="hotelsList"></div>
            </div>
        </div>

        <div id="searchTab" class="tab-content">
            <div class="card">
                <h2>Search Available Rooms</h2>
                <input type="date" id="checkIn" placeholder="Check-in Date">
                <input type="date" id="checkOut" placeholder="Check-out Date">
                <select id="roomType">
                    <option value="">All Types</option>
                    <option value="STANDARD">Standard</option>
                    <option value="DELUXE">Deluxe</option>
                    <option value="SUITE">Suite</option>
                </select>
                <button onclick="searchRooms()" class="btn btn-primary">Search</button>
                <div id="searchResults"></div>
            </div>
        </div>

        <div id="mybookingsTab" class="tab-content">
            <div class="card">
                <h2>My Bookings</h2>
                <div id="myBookingsList"></div>
            </div>
        </div>

        <!-- ADMIN VIEWS -->
        <div id="dashboardTab" class="tab-content">
            <div class="card">
                <h2>Admin Dashboard</h2>
                <div id="statsGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:20px;"></div>
                <h3>Recent Bookings</h3>
                <div id="recentBookings"></div>
            </div>
        </div>

        <div id="manageHotelsTab" class="tab-content">
            <div class="card">
                <h2>Manage Hotels</h2>
                <button onclick="showAddHotel()" class="btn btn-success">➕ Add Hotel</button>
                <div id="adminHotelsList"></div>
            </div>
        </div>

        <div id="manageRoomsTab" class="tab-content">
            <div class="card">
                <h2>Manage Rooms</h2>
                <select id="adminHotelSelect" onchange="loadAdminRooms()">
                    <option value="">Select Hotel</option>
                </select>
                <button onclick="showAddRoom()" class="btn btn-success">➕ Add Room</button>
                <div id="adminRoomsList"></div>
            </div>
        </div>

        <div id="allBookingsTab" class="tab-content">
            <div class="card">
                <h2>All User Bookings</h2>
                <div id="allBookingsList"></div>
            </div>
        </div>

        <div id="manageUsersTab" class="tab-content">
            <div class="card">
                <h2>Manage Users</h2>
                <div id="usersList"></div>
            </div>
        </div>
    </div>

    <!-- Hotel Modal -->
    <div id="hotelModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('hotelModal')">&times;</span>
            <h2 id="hotelModalTitle">Add Hotel</h2>
            <input type="hidden" id="hotelId">
            <input type="text" id="hotelName" placeholder="Hotel Name">
            <input type="text" id="hotelLocation" placeholder="Location">
            <textarea id="hotelDescription" placeholder="Description"></textarea>
            <button onclick="saveHotel()" class="btn btn-primary">Save</button>
        </div>
    </div>

    <!-- Room Modal -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('roomModal')">&times;</span>
            <h2 id="roomModalTitle">Add Room</h2>
            <input type="hidden" id="roomId">
            <input type="text" id="roomNumber" placeholder="Room Number">
            <select id="roomTypeSelect">
                <option value="STANDARD">Standard</option>
                <option value="DELUXE">Deluxe</option>
                <option value="SUITE">Suite</option>
            </select>
            <input type="number" id="roomPrice" placeholder="Price per Night">
            <button onclick="saveRoom()" class="btn btn-primary">Save</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentAdminHotelId = null;
        const API_URL = 'http://localhost:8080/api';

        checkAuth();

        function checkAuth() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('authSection').innerHTML = `
                    <span style="margin-right:15px;">Welcome, ${currentUser.name} (${currentUser.role})</span>
                    <button onclick="logout()" class="btn btn-danger">Logout</button>
                `;
                
                if (currentUser.role === 'ADMIN') {
                    document.getElementById('adminTabs').style.display = 'block';
                    document.getElementById('userTabs').style.display = 'none';
                    loadAdminDashboard();
                    loadAdminHotels();
                    loadAdminHotelsForSelect();
                    loadAllBookings();
                    loadUsers();
                    showTab('dashboard');
                } else {
                    document.getElementById('adminTabs').style.display = 'none';
                    document.getElementById('userTabs').style.display = 'block';
                    loadHotels();
                    loadMyBookings();
                    showTab('hotels');
                }
            } else {
                document.getElementById('authSection').innerHTML = `
                    <button onclick="window.location.href='login.html'" class="btn btn-primary">Login</button>
                    <button onclick="window.location.href='register.html'" class="btn btn-success">Register</button>
                `;
                document.getElementById('userTabs').style.display = 'block';
                document.getElementById('adminTabs').style.display = 'none';
                loadHotels();
                showTab('hotels');
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // ============ USER FUNCTIONS ============
        async function loadHotels() {
            const response = await fetch(`${API_URL}/hotels`);
            const hotels = await response.json();
            const hotelsList = document.getElementById('hotelsList');
            hotelsList.innerHTML = hotels.map(hotel => `
                <div class="hotel-card">
                    <h3>${hotel.name}</h3>
                    <p>📍 ${hotel.location}</p>
                    <p>${hotel.description || ''}</p>
                    <button onclick="viewRooms(${hotel.id})" class="btn btn-primary">View Rooms</button>
                </div>
            `).join('');
        }

        async function viewRooms(hotelId) {
            const response = await fetch(`${API_URL}/hotels/${hotelId}/rooms`);
            const rooms = await response.json();
            let message = 'Rooms:\n';
            rooms.forEach(room => {
                message += `Room ${room.roomNumber}: ${room.type} - $${room.pricePerNight}/night (${room.status})\n`;
            });
            alert(message);
        }

        async function searchRooms() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const type = document.getElementById('roomType').value;
            
            let url = `${API_URL}/rooms`;
            if (type) url = `${API_URL}/rooms/search/by-type?type=${type}`;
            
            const response = await fetch(url);
            const rooms = await response.json();
            
            const results = document.getElementById('searchResults');
            results.innerHTML = `
                <h3>Available Rooms (${rooms.length})</h3>
                ${rooms.map(room => `
                    <div class="room-card">
                        <p><strong>Room ${room.roomNumber}</strong> - ${room.type}</p>
                        <p>💰 $${room.pricePerNight}/night</p>
                        ${currentUser ? `
                            <button onclick="bookRoom(${room.id})" class="btn btn-success">Book Now</button>
                        ` : '<p>Please login to book</p>'}
                    </div>
                `).join('')}
            `;
        }

        async function bookRoom(roomId) {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            
            if (!checkIn || !checkOut) {
                alert('Please select dates');
                return;
            }
            
            const response = await fetch(`${API_URL}/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.id,
                    roomId: roomId,
                    checkIn: checkIn,
                    checkOut: checkOut
                })
            });
            
            if (response.ok) {
                const booking = await response.json();
                alert(`Booking successful! Total: $${booking.totalPrice}`);
                loadMyBookings();
                showTab('mybookings');
            } else {
                alert('Booking failed. Room may be unavailable.');
            }
        }

        async function loadMyBookings() {
            if (!currentUser) return;
            const response = await fetch(`${API_URL}/bookings/user/${currentUser.id}`);
            const bookings = await response.json();
            
            const myBookingsList = document.getElementById('myBookingsList');
            if (bookings.length === 0) {
                myBookingsList.innerHTML = '<p>No bookings yet.</p>';
            } else {
                myBookingsList.innerHTML = bookings.map(booking => `
                    <div class="booking-card">
                        <p><strong>${booking.hotelName}</strong> - Room ${booking.roomNumber}</p>
                        <p>📅 ${booking.checkIn} to ${booking.checkOut}</p>
                        <p>💰 Total: $${booking.totalPrice}</p>
                        <p>Status: ${booking.status}</p>
                        ${booking.status === 'CONFIRMED' ? `
                            <button onclick="cancelBooking(${booking.id})" class="btn btn-danger">Cancel</button>
                        ` : ''}
                    </div>
                `).join('');
            }
        }

        async function cancelBooking(bookingId) {
            if (confirm('Cancel this booking?')) {
                await fetch(`${API_URL}/bookings/${bookingId}`, { method: 'DELETE' });
                alert('Booking cancelled!');
                loadMyBookings();
            }
        }

        // ============ ADMIN FUNCTIONS ============
        async function loadAdminDashboard() {
            const hotelsRes = await fetch(`${API_URL}/hotels`);
            const roomsRes = await fetch(`${API_URL}/rooms`);
            const bookingsRes = await fetch(`${API_URL}/bookings`);
            const usersRes = await fetch(`${API_URL}/users`);
            
            const hotels = await hotelsRes.json();
            const rooms = await roomsRes.json();
            const bookings = await bookingsRes.json();
            const users = await usersRes.json();
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card" style="background:#3498db; color:white; padding:20px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px;">${hotels.length}</div>
                    <div>Hotels</div>
                </div>
                <div class="stat-card" style="background:#27ae60; color:white; padding:20px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px;">${rooms.length}</div>
                    <div>Rooms</div>
                </div>
                <div class="stat-card" style="background:#e74c3c; color:white; padding:20px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px;">${bookings.length}</div>
                    <div>Bookings</div>
                </div>
                <div class="stat-card" style="background:#f39c12; color:white; padding:20px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px;">${users.length}</div>
                    <div>Users</div>
                </div>
            `;
            
            const recent = bookings.slice(-5).reverse();
            document.getElementById('recentBookings').innerHTML = recent.map(b => `
                <div class="booking-card">${b.userName} booked ${b.hotelName} - $${b.totalPrice}</div>
            `).join('');
        }

        async function loadAdminHotels() {
            const response = await fetch(`${API_URL}/hotels`);
            const hotels = await response.json();
            document.getElementById('adminHotelsList').innerHTML = hotels.map(hotel => `
                <div class="hotel-card">
                    <h3>${hotel.name}</h3>
                    <p>📍 ${hotel.location}</p>
                    <button onclick="editHotel(${hotel.id})" class="btn btn-warning">Edit</button>
                    <button onclick="deleteHotel(${hotel.id})" class="btn btn-danger">Delete</button>
                </div>
            `).join('');
        }

        async function loadAdminHotelsForSelect() {
            const response = await fetch(`${API_URL}/hotels`);
            const hotels = await response.json();
            const select = document.getElementById('adminHotelSelect');
            select.innerHTML = '<option value="">Select Hotel</option>' + 
                hotels.map(h => `<option value="${h.id}">${h.name}</option>`).join('');
        }

        async function loadAdminRooms() {
            const hotelId = document.getElementById('adminHotelSelect').value;
            if (!hotelId) return;
            currentAdminHotelId = hotelId;
            const response = await fetch(`${API_URL}/hotels/${hotelId}/rooms`);
            const rooms = await response.json();
            document.getElementById('adminRoomsList').innerHTML = rooms.map(room => `
                <div class="room-card">
                    <p>Room ${room.roomNumber} - ${room.type} - $${room.pricePerNight}/night</p>
                    <button onclick="editRoom(${room.id})" class="btn btn-warning">Edit</button>
                    <button onclick="deleteRoom(${room.id})" class="btn btn-danger">Delete</button>
                </div>
            `).join('');
        }

        function showAddHotel() {
            document.getElementById('hotelModalTitle').innerText = 'Add Hotel';
            document.getElementById('hotelId').value = '';
            document.getElementById('hotelName').value = '';
            document.getElementById('hotelLocation').value = '';
            document.getElementById('hotelDescription').value = '';
            document.getElementById('hotelModal').style.display = 'block';
        }

        async function editHotel(id) {
            const res = await fetch(`${API_URL}/hotels/${id}`);
            const hotel = await res.json();
            document.getElementById('hotelModalTitle').innerText = 'Edit Hotel';
            document.getElementById('hotelId').value = hotel.id;
            document.getElementById('hotelName').value = hotel.name;
            document.getElementById('hotelLocation').value = hotel.location;
            document.getElementById('hotelDescription').value = hotel.description || '';
            document.getElementById('hotelModal').style.display = 'block';
        }

        async function saveHotel() {
            const id = document.getElementById('hotelId').value;
            const hotel = {
                name: document.getElementById('hotelName').value,
                location: document.getElementById('hotelLocation').value,
                description: document.getElementById('hotelDescription').value
            };
            const url = id ? `${API_URL}/hotels/${id}` : `${API_URL}/hotels`;
            const method = id ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(hotel) });
            alert(id ? 'Hotel updated' : 'Hotel created');
            closeModal('hotelModal');
            loadAdminHotels();
            loadAdminHotelsForSelect();
            loadAdminDashboard();
        }

        async function deleteHotel(id) {
            if (confirm('Delete this hotel?')) {
                await fetch(`${API_URL}/hotels/${id}`, { method: 'DELETE' });
                alert('Deleted');
                loadAdminHotels();
                loadAdminHotelsForSelect();
                loadAdminDashboard();
            }
        }

        function showAddRoom() {
            if (!currentAdminHotelId) { alert('Select hotel first'); return; }
            document.getElementById('roomModalTitle').innerText = 'Add Room';
            document.getElementById('roomId').value = '';
            document.getElementById('roomNumber').value = '';
            document.getElementById('roomPrice').value = '';
            document.getElementById('roomModal').style.display = 'block';
        }

        async function editRoom(id) {
            const res = await fetch(`${API_URL}/rooms`);
            const rooms = await res.json();
            const room = rooms.find(r => r.id == id);
            document.getElementById('roomModalTitle').innerText = 'Edit Room';
            document.getElementById('roomId').value = room.id;
            document.getElementById('roomNumber').value = room.roomNumber;
            document.getElementById('roomTypeSelect').value = room.type;
            document.getElementById('roomPrice').value = room.pricePerNight;
            document.getElementById('roomModal').style.display = 'block';
        }

        async function saveRoom() {
            const id = document.getElementById('roomId').value;
            const room = {
                roomNumber: document.getElementById('roomNumber').value,
                type: document.getElementById('roomTypeSelect').value,
                pricePerNight: parseFloat(document.getElementById('roomPrice').value),
                status: 'AVAILABLE'
            };
            const url = id ? `${API_URL}/rooms/${id}` : `${API_URL}/hotels/${currentAdminHotelId}/rooms`;
            const method = id ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(room) });
            alert(id ? 'Room updated' : 'Room created');
            closeModal('roomModal');
            loadAdminRooms();
            loadAdminDashboard();
        }

        async function deleteRoom(id) {
            if (confirm('Delete this room?')) {
                await fetch(`${API_URL}/rooms/${id}`, { method: 'DELETE' });
                alert('Deleted');
                loadAdminRooms();
                loadAdminDashboard();
            }
        }

        async function loadAllBookings() {
            const res = await fetch(`${API_URL}/bookings`);
            const bookings = await res.json();
            document.getElementById('allBookingsList').innerHTML = bookings.map(b => `
                <div class="booking-card">${b.userName} booked ${b.hotelName} - Room ${b.roomNumber} - $${b.totalPrice}</div>
            `).join('');
        }

        async function loadUsers() {
            const res = await fetch(`${API_URL}/users`);
            const users = await res.json();
            document.getElementById('usersList').innerHTML = users.map(u => `
                <div class="user-card">${u.name} (${u.email}) - ${u.role}
                    <button onclick="deleteUser(${u.id})" class="btn btn-danger">Delete</button>
                </div>
            `).join('');
        }

        async function deleteUser(id) {
            if (confirm('Delete this user?')) {
                await fetch(`${API_URL}/users/${id}`, { method: 'DELETE' });
                alert('Deleted');
                loadUsers();
                loadAdminDashboard();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
    </script>
</body>
</html>
